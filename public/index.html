<!DOCTYPE html>
<html>
<head>
  <title>CareerAI Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <!-- HERO -->
  <section class="hero">
    <h1>Your AI Career Coach for Professional Success</h1>
    <p>Get insights, trends, and personalized career guidance</p>
    <button onclick="startChat()">Get Started</button>
  </section>

  <!-- INSIGHTS -->
  <section class="cards">
    <div class="card" id="growth"></div>
    <div class="card" id="demand"></div>
    <div class="card" id="visitors"></div>
  </section>

  <!-- SKILLS -->
  <section>
    <h2>🔥 Top Skills</h2>
    <div id="skills" class="skills"></div>
  </section>

  <!-- SALARY CHART -->
  <section>
    <h2>💰 Salary Insights</h2>
    <canvas id="chart" width="400" height="200"></canvas>
  </section>

  <!-- CHAT -->
  <section>
    <h2>🤖 AI Career Assistant</h2>
    <div id="chatBox"></div>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
<script src="script.js"></script>

</body>
</html>
